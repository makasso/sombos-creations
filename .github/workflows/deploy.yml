name: 🚀 Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  # ─── BUILD & TEST ─────────────────────────────────────────────
  build:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, curl, zip, gd, mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            vendor/
            public/build/
          retention-days: 1

  # ─── DEPLOY ───────────────────────────────────────────────────
  deploy:
    name: 📦 Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: .

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ~/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html
            echo "🔄 Activating maintenance mode..."
            php artisan down --secret="deploy-bypass-token" || true
            echo "📥 Pulling latest changes..."
            git pull origin main
            echo "📦 Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            echo "🔧 Running migrations..."
            php artisan migrate --force
            echo "🗑️ Clearing caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            echo "🔗 Storage link..."
            php artisan storage:link || true
            echo "✅ Disabling maintenance mode..."
            php artisan up
            echo "🎉 Deployment complete!"

      - name: Deployment status
        if: success()
        run: echo "✅ Deployment to Hostinger completed successfully!"

      - name: Deployment failure
        if: failure()
        run: echo "❌ Deployment failed. Check the logs above."


name: 🚀 Deploy to Hostinger (SFTP)

# ──────────────────────────────────────────────────────────────────
# Alternative deployment via SFTP if SSH commands are not available
# on your Hostinger plan. Use this OR deploy.yml, not both.
# ──────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: 🏗️ Build & Deploy via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, bcmath, curl, zip, gd, mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: 22
          protocol: sftp
          local-dir: ./
          server-dir: ./domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            .env.backup
            storage/logs/**
            storage/framework/sessions/**
            storage/framework/cache/**
            tests/**
            .github/**

